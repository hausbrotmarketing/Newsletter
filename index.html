<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hausbrot · Newsletter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F3EE;--warm:#EDE5D8;--brown:#3D2B1F;--bm:#7A5C48;--bl:#B89880;
  --accent:#C4622D;--al:#F0D5C4;--white:#FFFFFF;
  --border:rgba(61,43,31,0.1);--bmed:rgba(61,43,31,0.18)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);min-height:100vh}
.hidden{display:none!important}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.fade{animation:fadeUp .3s ease forwards}

/* ── LOGIN ── */
#pg-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--brown);padding:16px;position:relative;overflow:hidden}
#pg-login::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(196,98,45,.1);bottom:-120px;right:-120px;pointer-events:none}
.lbox{background:var(--white);border-radius:24px;padding:48px 40px;width:100%;max-width:380px;position:relative;z-index:1}
.llogo{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:4px;letter-spacing:-.01em}
.lsub{font-size:13px;color:var(--bl);margin-bottom:36px}
.lfield label{font-size:11px;font-weight:500;color:var(--bm);letter-spacing:.08em;display:block;margin-bottom:6px}
.lfield input{width:100%;padding:12px 14px;border:1.5px solid var(--bmed);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);outline:none;transition:border-color .2s;margin-bottom:4px}
.lfield input:focus{border-color:var(--accent);background:var(--white)}
.lerr{color:#9b2c2c;font-size:12px;margin-bottom:14px;background:#FDE8E8;padding:8px 12px;border-radius:8px}
.lbtn{width:100%;padding:13px;background:var(--brown);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:18px;transition:background .2s}
.lbtn:hover{background:var(--accent)}
.lcred{margin-top:20px;font-size:11px;color:var(--bl);text-align:center;line-height:1.9}

/* ── NAV ── */
#pg-app{display:none}
nav{background:var(--brown);position:sticky;top:0;z-index:300;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 1.75rem}
.nav-logo{font-family:'Playfair Display',serif;font-size:21px;color:#fff;letter-spacing:-.01em}
.nav-tabs{display:flex;gap:2px}
.ntab{padding:6px 13px;background:none;border:none;border-radius:7px;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.ntab.on,.ntab:hover{background:rgba(255,255,255,.13);color:#fff}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-role{font-size:11px;color:rgba(255,255,255,.35)}
.nav-out{padding:4px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:6px;color:rgba(255,255,255,.55);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.nav-out:hover{background:rgba(255,255,255,.15);color:#fff}

/* ── PAGES ── */
.page{display:none}.page.on{display:block}
.wrap{max-width:880px;margin:0 auto;padding:1.75rem 1.5rem}
.wrap-sm{max-width:660px;margin:0 auto;padding:1.75rem 1.5rem}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px}
.stat{background:var(--white);border-radius:14px;padding:16px 18px;border:1px solid var(--border)}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-n{font-family:'Playfair Display',serif;font-size:26px;color:var(--brown)}
.stat-l{font-size:10px;color:var(--bm);margin-top:1px}

/* ── HERO CARD ── */
.hero{background:var(--brown);border-radius:20px;padding:26px 30px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(196,98,45,.18);pointer-events:none}
.hero-eyebrow{font-size:10px;font-weight:500;color:rgba(255,255,255,.4);letter-spacing:.12em;margin-bottom:10px}
.hero-title{font-family:'Playfair Display',serif;font-size:24px;color:#fff;margin-bottom:7px;line-height:1.25;position:relative;z-index:1}
.hero-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:18px;position:relative;z-index:1}

/* ── BADGE ── */
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:10px;font-weight:500;letter-spacing:.02em}

/* ── CARD ── */
.card{background:var(--white);border-radius:18px;border:1px solid var(--border);padding:1.25rem 1.5rem}

/* ── NEWSLETTER VIEW ── */
.nl-hero{background:var(--brown);border-radius:20px 20px 0 0;padding:36px 38px 28px;position:relative;overflow:hidden}
.nl-hero::after{content:'';position:absolute;bottom:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(196,98,45,.16);pointer-events:none}
.nl-body{background:var(--white);padding:24px 38px 30px}
.nl-foot{background:var(--warm);border-radius:0 0 20px 20px;padding:20px 38px;text-align:center}
.nl-intro{font-size:14px;line-height:1.8;color:var(--bm);margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.nl-item{display:flex;gap:15px;padding:18px 0;border-bottom:1px solid var(--border)}
.nl-item:last-child{border-bottom:none}
.nl-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;background:var(--warm)}
.nl-ititle{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--brown);margin:5px 0 7px;line-height:1.3}
.nl-itext{font-size:13px;line-height:1.75;color:var(--bm)}
.expand-btn{background:none;border:none;font-size:11px;color:var(--accent);cursor:pointer;font-weight:500;margin-top:6px;padding:0;font-family:'DM Sans',sans-serif}

/* ── ARCHIVE GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.nl-card{background:var(--white);border-radius:18px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .2s}
.nl-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(61,43,31,.1)}
.nl-card-top{background:var(--brown);padding:18px 20px;position:relative;overflow:hidden}
.nl-card-top::after{content:'';position:absolute;bottom:-28px;right:-28px;width:90px;height:90px;border-radius:50%;background:rgba(196,98,45,.2);pointer-events:none}
.nl-card-body{padding:14px 20px 18px}

/* ── FILTERS ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fbtn{padding:4px 11px;border-radius:999px;font-size:10px;font-weight:500;border:1px solid var(--border);background:var(--white);color:var(--bm);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── TIMELINE ── */
.tl-wrap{position:relative}
.tl-line{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--warm);transform:translateX(-50%)}
.tl-dot{position:absolute;left:50%;transform:translateX(-50%);border-radius:50%;border:3px solid var(--cream);z-index:1}

/* ── EDITOR ── */
.ed-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:1.25rem 1.5rem;margin-bottom:14px}
.ed-label{font-size:11px;font-weight:500;color:var(--bm);letter-spacing:.05em;display:block;margin-bottom:5px}
.ed-input{width:100%;padding:8px 12px;border:1px solid var(--bmed);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--brown);outline:none;transition:border-color .15s;line-height:1.5}
.ed-input:focus{border-color:var(--accent);background:var(--white)}
textarea.ed-input{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.item-ed{background:var(--cream);border-radius:12px;border:1px solid var(--bmed);padding:12px 14px;margin-bottom:10px;position:relative}
.ep-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.ep{width:30px;height:30px;border:1px solid var(--border);border-radius:7px;font-size:14px;cursor:pointer;background:var(--white);display:flex;align-items:center;justify-content:center;transition:all .12s}
.ep:hover,.ep.on{border-color:var(--accent);background:var(--al)}

/* ── BUTTONS ── */
.btn{padding:8px 18px;font-size:12px;font-weight:500;border-radius:9px;border:1.5px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-acc{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-acc:hover{background:#b0521f}
.btn-out{background:transparent;color:var(--brown);border-color:var(--bmed)}.btn-out:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.22)}.btn-ghost:hover{background:rgba(255,255,255,.22)}
.btn-danger{background:#FDE8E8;color:#9b2c2c;border-color:#F5C0C0}
.btn-sm{padding:4px 11px;font-size:11px}

/* ── SAVING SPINNER ── */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner-dark{border-color:var(--bmed);border-top-color:var(--accent)}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;background:var(--brown);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;z-index:9999;animation:fadeUp .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.2)}

/* ── SAVING INDICATOR IN NAV ── */
.saving-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5);padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.08)}
.pulse{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .nl-hero,.nl-body,.nl-foot{padding-left:20px;padding-right:20px}
  .wrap,.wrap-sm{padding:1rem}
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="pg-login">
  <div class="lbox fade">
    <div class="llogo">Hausbrot</div>
    <div class="lsub">Plataforma interna · Comunicaciones</div>
    <div class="lerr hidden" id="lerr">Contraseña incorrecta. Intentá de nuevo.</div>
    <div class="lfield" style="margin-bottom:16px">
      <label>CONTRASEÑA</label>
      <input type="password" id="lpw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="lbtn" onclick="doLogin()">Ingresar →</button>
    <div class="lcred">
      Admin: <strong>hausbrot2025</strong><br>
      Franquicia: <strong>franquicia2025</strong>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="pg-app">
  <nav>
    <span class="nav-logo">Hausbrot</span>
    <div class="nav-tabs">
      <button class="ntab on" onclick="goTab('dash',this)">Inicio</button>
      <button class="ntab" onclick="goTab('arch',this)">Archivo</button>
      <button class="ntab" onclick="goTab('tl',this)">Historia</button>
      <button class="ntab hidden" id="editor-tab" onclick="goTab('editor',this)">Editor</button>
    </div>
    <div class="nav-r">
      <div class="saving-pill hidden" id="saving-ind"><div class="pulse"></div>Guardando...</div>
      <span class="nav-role" id="nav-role"></span>
      <button class="nav-out" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <div id="page-dash"   class="page on"></div>
  <div id="page-arch"   class="page"></div>
  <div id="page-tl"     class="page"></div>
  <div id="page-editor" class="page"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURACIÓN
// ══════════════════════════════════════════════
var ADMIN_PW     = 'hausbrot2025';
var FRANCHISE_PW = 'franquicia2025';
var STORAGE_KEY  = 'hausbrot_newsletters_v1';
// ══════════════════════════════════════════════

var role = null;
var DB = { newsletters: [], milestones: [] };
var archFilter = 'all', archSearch = '', editingId = null;

var CAT = {
  fechas:        {label:'Fechas especiales', color:'#8a5f10', bg:'#F5EDD5'},
  operaciones:   {label:'Operaciones',       color:'#3B6D11', bg:'#EAF3DE'},
  promociones:   {label:'Promociones',       color:'#C4622D', bg:'#F0D5C4'},
  redes:         {label:'Redes sociales',    color:'#4a3580', bg:'#EAE4F5'},
  acciones:      {label:'Acciones',          color:'#9b2c2c', bg:'#FDE8E8'},
  apertura:      {label:'Apertura',          color:'#1a5e8a', bg:'#E3F0FB'},
  productos:     {label:'Productos',         color:'#0F6E56', bg:'#E1F5EE'},
  certificacion: {label:'Certificaciones',   color:'#533A00', bg:'#FAEEDA'},
};

var EMOJIS = ['🔸','🛒','🇦🇷','🎉','📣','⭐','🥐','🍞','🌟','💡','📅','🔔','✅','🎁','🏪','📦','🔥','💬','🗓️','🎯','🚀','❄️','🌱','🌿','📍','⚠️','💛','🤝'];

var MILESTONES = [
  {year:2020,month:'Mar',text:'Nace Hausbrot',icon:'🌱',cat:'apertura'},
  {year:2021,month:'Jun',text:'Primera franquicia',icon:'🤝',cat:'apertura'},
  {year:2022,month:'Sep',text:'Certificación orgánica',icon:'🌿',cat:'certificacion'},
  {year:2023,month:'Feb',text:'5 sucursales activas',icon:'🏪',cat:'apertura'},
  {year:2023,month:'Nov',text:'Certificación vegana',icon:'✅',cat:'certificacion'},
  {year:2024,month:'Abr',text:'Hot Sale – récord ventas',icon:'🔥',cat:'promociones'},
  {year:2024,month:'Ago',text:'Nueva línea integral',icon:'🍞',cat:'productos'},
  {year:2025,month:'May',text:'Apertura Bella Vista',icon:'🚀',cat:'apertura'},
  {year:2025,month:'Jun',text:'Unicenter, Palermo, Belgrano',icon:'📍',cat:'apertura'},
];

var DEFAULT_DB = {
  newsletters: [
    {id:1,mes:'Mayo',year:2025,titulo:'Novedades Hausbrot – Mayo',subtitulo:'Celebramos el trabajo, lanzamos acciones y seguimos creciendo.',intro:'¡Hola equipo! Estas son las novedades y acciones para este mes. Ante cualquier consulta no duden en comunicarse.',pinned:true,items:[
      {id:11,icon:'🛒',cat:'fechas',titulo:'Día del Trabajador – 1° de mayo',texto:'El viernes 1 de mayo los locales permanecerán cerrados.\n\nUn momento para reconocer y agradecer el compromiso de cada persona que forma parte de Hausbrot 💛'},
      {id:12,icon:'🇦🇷',cat:'acciones',titulo:'Hot Sale – del 11 al 13 de mayo',texto:'Durante el Hot Sale todas las compras online incluyen un Ticket Dorado que se canjea en sucursales.\n\nVigencia: 11 al 13 de mayo. Canje válido hasta el 24 de mayo.\n\nBeneficios: 10%, 15% o 20% OFF. No acumulable.\n\nEnviar a planta por cada canje: Nombre, DNI, Mail y Nº de ticket.'},
      {id:13,icon:'📣',cat:'acciones',titulo:'25 de mayo – Tradición Hausbrot',texto:'Vamos a estar realizando una acción para traccionar más clientes a los locales. Próximamente les enviaremos los detalles de marketing y operativos.'},
      {id:14,icon:'📅',cat:'apertura',titulo:'Nueva apertura – Bella Vista 🚀',texto:'El lunes 4 de mayo abrimos una nueva sucursal en Bella Vista.\n\nLes deseamos muchísimo éxito en esta nueva etapa. Cada apertura es un paso más para seguir acercando nuestros alimentos verdaderos a más personas.'},
      {id:15,icon:'⭐',cat:'productos',titulo:'Pepas de Chocolate',texto:'Desde el jueves 7 de mayo vuelven a estar en stock las pepas de chocolate.\n\nProducto muy pedido → oportunidad para recomendar en mostrador.\n\nSugerencia: ofrecerlas activamente como opción dulce.'},
      {id:16,icon:'🎯',cat:'redes',titulo:'Redes sociales – Mayo',texto:'Durante mayo ponemos el foco en contenido que aporte valor real a la comunidad.\n\nContenido educativo: qué aportan nuestros productos, qué los diferencia, por qué elegir alimentos 100% integrales.\n\nContenido cercano: que las personas se identifiquen y conecten con la marca desde un lugar más humano.'},
    ]},
    {id:2,mes:'Junio',year:2025,titulo:'Novedades Hausbrot – Junio',subtitulo:'Nuevas aperturas, certificaciones y el crecimiento continúa.',intro:'¡Hola equipo! Junio viene cargado de novedades. Seguimos creciendo juntos.',pinned:false,items:[
      {id:21,icon:'🏪',cat:'apertura',titulo:'Nuevas franquicias en camino',texto:'Próximamente se sumarán nuevas franquicias a la familia Hausbrot. El crecimiento no para.'},
      {id:22,icon:'📅',cat:'fechas',titulo:'20 de junio – Fecha especial',texto:'Próximamente comunicaremos posibles acciones y descuentos. Estén atentos al próximo mail.'},
      {id:23,icon:'🚀',cat:'apertura',titulo:'Bella Vista – Ya abrió sus puertas',texto:'La sucursal Bella Vista ya está funcionando. ¡Bienvenidos a la familia!'},
      {id:24,icon:'❄️',cat:'productos',titulo:'Línea de productos congelados',texto:'Avanzamos con el desarrollo de la nueva línea de productos congelados. Próximamente más detalles.'},
      {id:25,icon:'🌱',cat:'certificacion',titulo:'Renovación de certificaciones',texto:'En proceso de renovación de la certificación orgánica y vegana. Actualmente en auditoría.'},
      {id:26,icon:'📍',cat:'apertura',titulo:'Próximas aperturas',texto:'Unicenter, Alto Palermo y Belgrano se suman próximamente. ¡El crecimiento no para!'},
    ]},
  ],
  milestones: MILESTONES
};

// ── STORAGE ──────────────────────────────────────────────
function saveDB() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); } catch(e) {}
}
function loadDB() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { DB = JSON.parse(saved); return; }
  } catch(e) {}
  DB = JSON.parse(JSON.stringify(DEFAULT_DB));
  saveDB();
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function badge(cat){
  var m=CAT[cat]||{label:cat,color:'#7A5C48',bg:'#EDE5D8'};
  return '<span class="badge" style="background:'+m.bg+';color:'+m.color+'">'+m.label+'</span>';
}
var _tt;
function toast(msg){
  document.querySelectorAll('.toast').forEach(function(e){e.remove();});
  var el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);
  _tt=setTimeout(function(){el.style.opacity='0';el.style.transform='translateY(10px)';el.style.transition='all .3s';setTimeout(function(){el.remove();},300);},3500);
}
function setSaving(v){ document.getElementById('saving-ind').classList.toggle('hidden',!v); }

// ── AUTH ──────────────────────────────────────────────────
function doLogin(){
  var pw=document.getElementById('lpw').value;
  if(pw===ADMIN_PW) role='admin';
  else if(pw===FRANCHISE_PW) role='franchise';
  else {
    document.getElementById('lerr').classList.remove('hidden');
    document.getElementById('lpw').value='';
    document.getElementById('lpw').style.animation='shake .4s ease';
    setTimeout(function(){document.getElementById('lpw').style.animation='';},500);
    return;
  }
  document.getElementById('lerr').classList.add('hidden');
  document.getElementById('pg-login').style.display='none';
  document.getElementById('pg-app').style.display='block';
  document.getElementById('nav-role').textContent=role==='admin'?'Admin':'Franquiciado';
  if(role==='admin') document.getElementById('editor-tab').classList.remove('hidden');
  loadDB();
  renderDash();
}
function doLogout(){
  role=null;editingId=null;
  document.getElementById('pg-app').style.display='none';
  document.getElementById('pg-login').style.display='flex';
  document.getElementById('lpw').value='';
  document.getElementById('editor-tab').classList.add('hidden');
}

// ── TABS ──────────────────────────────────────────────────
function goTab(name,btn){
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.getElementById('page-'+name).classList.add('on');
  if(name==='dash')   renderDash();
  if(name==='arch')   renderArch();
  if(name==='tl')     renderTimeline();
  if(name==='editor') renderEditor(editingId);
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDash(){
  var el=document.getElementById('page-dash');
  var latest=DB.newsletters[0];
  var tOpen=DB.newsletters.reduce(function(a,n){return a+n.items.filter(function(i){return i.cat==='apertura';}).length;},0);
  var tAcc =DB.newsletters.reduce(function(a,n){return a+n.items.filter(function(i){return i.cat==='acciones';}).length;},0);
  var tProd=DB.newsletters.reduce(function(a,n){return a+n.items.filter(function(i){return i.cat==='productos';}).length;},0);

  var html='<div class="wrap fade"><div style="margin-bottom:22px"><div style="font-family:\'Playfair Display\',serif;font-size:26px;margin-bottom:4px">Bienvenidos al portal Hausbrot</div><div style="color:var(--bm);font-size:14px">Toda la comunicación interna, organizada y en tiempo real.</div></div>';
  html+='<div class="stats"><div class="stat"><div class="stat-icon">📋</div><div class="stat-n">'+DB.newsletters.length+'</div><div class="stat-l">Newsletters</div></div><div class="stat"><div class="stat-icon">🏪</div><div class="stat-n">'+tOpen+'</div><div class="stat-l">Aperturas</div></div><div class="stat"><div class="stat-icon">🎯</div><div class="stat-n">'+tAcc+'</div><div class="stat-l">Acciones</div></div><div class="stat"><div class="stat-icon">🍞</div><div class="stat-n">'+tProd+'</div><div class="stat-l">Productos</div></div></div>';

  if(latest){
    var ucats=[...new Set(latest.items.map(function(i){return i.cat;}))];
    html+='<div class="hero"><div class="hero-eyebrow">ÚLTIMO NEWSLETTER</div><div class="hero-title" style="z-index:1">'+esc(latest.titulo)+'</div><div class="hero-sub">'+esc(latest.subtitulo)+'</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px;position:relative;z-index:1">'+ucats.map(function(c){return badge(c);}).join('')+'</div><button onclick="openNL('+latest.id+')" class="btn btn-acc" style="position:relative;z-index:1">Leer newsletter →</button></div>';
    html+='<div class="card"><div style="font-family:\'Playfair Display\',serif;font-size:17px;margin-bottom:16px">Últimas noticias</div>';
    latest.items.slice(0,3).forEach(function(item){
      html+='<div style="display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:16px;line-height:1.2">'+item.icon+'</span><div>'+badge(item.cat)+'<div style="font-size:13px;font-weight:500;color:var(--brown);margin:3px 0 2px">'+esc(item.titulo)+'</div><div style="font-size:12px;color:var(--bm);line-height:1.5">'+esc(item.texto.split('\n')[0])+'</div></div></div>';
    });
    html+='<button onclick="goTab(\'arch\',document.querySelectorAll(\'.ntab\')[1])" style="margin-top:14px;background:none;border:none;color:var(--accent);font-size:12px;font-weight:500;cursor:pointer;font-family:\'DM Sans\',sans-serif">Ver todos los newsletters →</button></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

// ── NL VIEW ───────────────────────────────────────────────
function openNL(id){
  var nl=DB.newsletters.find(function(n){return n.id===id;});
  if(!nl) return;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.remove('on');});
  document.querySelectorAll('.ntab')[1].classList.add('on');
  var el=document.getElementById('page-arch');
  el.classList.add('on');

  var html='<div class="wrap-sm fade"><button onclick="renderArch()" style="background:none;border:none;color:var(--bm);font-size:12px;cursor:pointer;margin-bottom:18px;font-family:\'DM Sans\',sans-serif">← Volver al archivo</button>';
  html+='<div class="nl-hero">'+(nl.pinned?'<div style="display:inline-block;background:var(--accent);color:#fff;padding:2px 10px;border-radius:999px;font-size:10px;font-weight:500;letter-spacing:.06em;margin-bottom:12px">DESTACADO</div>':'')+
    '<div style="font-family:\'Playfair Display\',serif;font-size:28px;color:#fff;margin-bottom:7px;line-height:1.2;position:relative;z-index:1">'+esc(nl.titulo)+'</div>'+
    '<div style="font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px;position:relative;z-index:1">'+esc(nl.subtitulo)+'</div>'+
    '<span style="display:inline-block;background:var(--accent);color:#fff;padding:4px 14px;border-radius:999px;font-size:12px;font-weight:500;position:relative;z-index:1">'+nl.mes+' '+nl.year+'</span></div>';
  html+='<div class="nl-body"><p class="nl-intro">'+esc(nl.intro)+'</p>';

  nl.items.forEach(function(item,idx){
    var lines=item.texto.split('\n').filter(Boolean);
    var pid='nl'+id+'i'+idx;
    html+='<div class="nl-item"><div class="nl-icon">'+item.icon+'</div><div style="flex:1">'+badge(item.cat)+
      '<div class="nl-ititle">'+esc(item.titulo)+'</div>'+
      '<div class="nl-itext" id="'+pid+'p">'+esc(lines[0]||'')+'</div>'+
      '<div class="nl-itext" id="'+pid+'f" style="display:none">'+lines.map(function(l){return '<p style="margin-bottom:5px">'+esc(l)+'</p>';}).join('')+'</div>'+
      (lines.length>1?'<button class="expand-btn" id="'+pid+'b" onclick="xpand(\''+pid+'\')">Ver más ↓</button>':'')+
      '</div></div>';
  });

  html+='</div><div class="nl-foot"><div style="font-family:\'Playfair Display\',serif;font-size:18px;color:var(--bm);margin-bottom:4px">Hausbrot</div><div style="font-size:11px;color:var(--bl)">Newsletter interno · Solo para franquiciados · Ante consultas contactar a casa central</div></div></div>';
  el.innerHTML=html;
}

function xpand(pid){
  var p=document.getElementById(pid+'p'),f=document.getElementById(pid+'f'),b=document.getElementById(pid+'b');
  var open=f.style.display!=='none';
  p.style.display=open?'':'none';f.style.display=open?'none':'block';b.textContent=open?'Ver más ↓':'Ver menos ↑';
}

// ── ARCHIVE ───────────────────────────────────────────────
function renderArch(){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.ntab').forEach(function(t,i){t.classList.toggle('on',i===1);});
  document.getElementById('page-arch').classList.add('on');

  var cats=Object.keys(CAT);
  var filtered=DB.newsletters.filter(function(nl){
    var mc=archFilter==='all'||nl.items.some(function(i){return i.cat===archFilter;});
    var ms=!archSearch||nl.titulo.toLowerCase().includes(archSearch.toLowerCase());
    return mc&&ms;
  });

  var html='<div class="wrap fade"><div style="font-family:\'Playfair Display\',serif;font-size:26px;margin-bottom:4px">Archivo de newsletters</div><div style="color:var(--bm);font-size:14px;margin-bottom:20px">Todo el historial de comunicaciones internas de Hausbrot.</div>';
  html+='<div class="filter-row"><input value="'+esc(archSearch)+'" oninput="archSearch=this.value;renderArch()" placeholder="Buscar..." style="flex:1 1 150px;min-width:100px;padding:6px 11px;border:1px solid var(--bmed);border-radius:8px;font-size:12px;background:var(--white);color:var(--brown);outline:none;font-family:\'DM Sans\',sans-serif"><button onclick="archFilter=\'all\';renderArch()" class="fbtn'+(archFilter==='all'?' on':'')+'">Todos</button>'+cats.map(function(c){return '<button onclick="archFilter=\''+c+'\';renderArch()" class="fbtn'+(archFilter===c?' on':'')+'" >'+CAT[c].label+'</button>';}).join('')+'</div>';
  html+='<div class="grid">';

  filtered.forEach(function(nl){
    var ucats=[...new Set(nl.items.map(function(i){return i.cat;}))];
    html+='<div class="nl-card" onclick="openNL('+nl.id+')"><div class="nl-card-top">'+(nl.pinned?'<div style="font-size:9px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.1em;margin-bottom:5px">📌 DESTACADO</div>':'')+
      '<div style="font-family:\'Playfair Display\',serif;font-size:15px;color:#fff;line-height:1.3;margin-bottom:8px;position:relative;z-index:1">'+esc(nl.titulo)+'</div>'+
      '<span style="background:var(--accent);color:#fff;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:500;position:relative;z-index:1">'+nl.mes+' '+nl.year+'</span></div>'+
      '<div class="nl-card-body"><p style="font-size:12px;color:var(--bm);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">'+esc(nl.subtitulo)+'</p>'+
      '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px">'+ucats.slice(0,4).map(function(c){return badge(c);}).join('')+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:11px;color:var(--bm)">'+nl.items.length+' noticias</span>'+
      (role==='admin'?'<div style="display:flex;gap:5px" onclick="event.stopPropagation()"><button onclick="editNL('+nl.id+')" class="btn btn-sm" style="background:var(--al);border:none;color:var(--accent)">Editar</button><button onclick="deleteNL('+nl.id+')" class="btn btn-sm btn-danger">Borrar</button></div>':'')+
      '</div></div></div>';
  });

  if(!filtered.length) html+='<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--bl);font-size:14px">No se encontraron newsletters.</div>';
  html+='</div></div>';
  document.getElementById('page-arch').innerHTML=html;
}

// ── TIMELINE ──────────────────────────────────────────────
function renderTimeline(){
  var html='<div class="wrap-sm fade"><div style="text-align:center;margin-bottom:36px"><div style="font-family:\'Playfair Display\',serif;font-size:28px;margin-bottom:8px">Historia Hausbrot</div><div style="color:var(--bm);font-size:14px;max-width:400px;margin:0 auto;line-height:1.7">Crecemos juntos como marca. Cada hito es un paso más en nuestro camino.</div></div>';
  html+='<div class="tl-wrap"><div class="tl-line"></div>';
  MILESTONES.forEach(function(m,i){
    var isL=i%2===0;var meta=CAT[m.cat]||{color:'#C4622D',bg:'#F0D5C4'};
    html+='<div style="display:flex;justify-content:'+(isL?'flex-end':'flex-start')+';padding-'+(isL?'right':'left')+':52%;margin-bottom:20px;position:relative"><div class="tl-dot" style="background:'+meta.color+';top:14px;width:12px;height:12px"></div><div style="background:var(--white);border-radius:12px;padding:12px 16px;border:1px solid var(--border);max-width:220px"><div style="display:flex;align-items:center;gap:7px;margin-bottom:5px"><span style="font-size:18px">'+m.icon+'</span><span style="font-size:10px;font-weight:500;color:'+meta.color+';background:'+meta.bg+';padding:2px 7px;border-radius:999px">'+m.month+' '+m.year+'</span></div><div style="font-size:13px;font-weight:500;color:var(--brown)">'+esc(m.text)+'</div></div></div>';
  });
  html+='</div></div>';
  document.getElementById('page-tl').innerHTML=html;
}

// ── EDITOR ────────────────────────────────────────────────
var MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
var edForm=null;

function editNL(id){editingId=id;goTab('editor',document.getElementById('editor-tab'));}
function newNL(){editingId=null;edForm=null;goTab('editor',document.getElementById('editor-tab'));}

function renderEditor(id){
  var isEdit=id!==null&&id!==undefined;
  if(isEdit&&(!edForm||edForm.id!==id)){
    edForm=JSON.parse(JSON.stringify(DB.newsletters.find(function(n){return n.id===id;})||null));
  }
  if(!edForm){edForm={id:Date.now(),mes:'',year:new Date().getFullYear(),titulo:'',subtitulo:'',intro:'',pinned:false,items:[]};}

  var html='<div class="wrap fade"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px">';
  html+='<div><div style="font-family:\'Playfair Display\',serif;font-size:24px;margin-bottom:4px">'+(isEdit?'Editar newsletter':'Nuevo newsletter')+'</div><div style="color:var(--bm);font-size:13px">Los cambios se guardan automáticamente y todos los ven al instante.</div></div>';
  html+='<div style="display:flex;gap:8px">'+(isEdit?'<button onclick="cancelEdit()" class="btn btn-out">Cancelar</button>':'')+' <button onclick="saveNL()" class="btn btn-acc">💾 '+(isEdit?'Guardar cambios':'Publicar newsletter')+'</button></div></div>';

  html+='<div class="ed-card"><div style="font-size:10px;font-weight:500;color:var(--bl);letter-spacing:.1em;margin-bottom:14px">CONFIGURACIÓN DEL MES</div>';
  html+='<div class="grid2" style="margin-bottom:12px"><div><label class="ed-label">Mes</label><select class="ed-input" id="ef-mes"><option value="">Seleccioná un mes</option>'+MONTHS.map(function(m){return '<option'+(edForm.mes===m?' selected':'')+'>'+m+'</option>';}).join('')+'</select></div>';
  html+='<div><label class="ed-label">Año</label><input class="ed-input" type="number" id="ef-year" value="'+edForm.year+'"></div></div>';
  html+='<div style="margin-bottom:10px"><label class="ed-label">Título del newsletter</label><input class="ed-input" id="ef-titulo" value="'+esc(edForm.titulo)+'" placeholder="Ej: Novedades Hausbrot – Junio"></div>';
  html+='<div style="margin-bottom:10px"><label class="ed-label">Subtítulo</label><input class="ed-input" id="ef-sub" value="'+esc(edForm.subtitulo)+'" placeholder="Breve descripción del mes..."></div>';
  html+='<div style="margin-bottom:12px"><label class="ed-label">Introducción</label><textarea class="ed-input" id="ef-intro" rows="2" placeholder="¡Hola equipo!...">'+esc(edForm.intro)+'</textarea></div>';
  html+='<div style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="ef-pin"'+(edForm.pinned?' checked':'')+' style="width:14px;height:14px;cursor:pointer"><label for="ef-pin" style="font-size:12px;color:var(--bm);cursor:pointer">📌 Marcar como destacado</label></div></div>';

  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:10px;font-weight:500;color:var(--bl);letter-spacing:.1em">NOTICIAS ('+edForm.items.length+')</span><button onclick="addItem()" class="btn btn-out btn-sm">+ Agregar noticia</button></div>';
  html+='<div id="items-container">';
  edForm.items.forEach(function(item,i){html+=renderItemEd(item,i);});
  if(!edForm.items.length) html+='<div style="background:var(--white);border-radius:14px;border:1.5px dashed var(--border);padding:28px;text-align:center;color:var(--bl);font-size:13px;margin-bottom:12px">Hacé click en "+ Agregar noticia" para empezar.</div>';
  html+='</div>';
  html+='<div style="display:flex;justify-content:flex-end;margin-top:16px"><button onclick="saveNL()" class="btn btn-acc">💾 '+(isEdit?'Guardar cambios':'Publicar newsletter')+'</button></div></div>';

  document.getElementById('page-editor').innerHTML=html;
}

function renderItemEd(item,i){
  var eps=EMOJIS.map(function(e){return '<div class="ep'+(item.icon===e?' on':'')+'" onclick="setIcon('+i+',\''+e+'\')">'+e+'</div>';}).join('');
  return '<div class="item-ed" id="ied-'+i+'"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:10px;font-weight:500;color:var(--bl);letter-spacing:.08em">NOTICIA '+(i+1)+'</span><button onclick="removeItem('+i+')" class="btn btn-sm btn-danger">× Eliminar</button></div>'+
    '<div class="grid2" style="margin-bottom:8px"><div><label class="ed-label">Título</label><input class="ed-input" id="it-titulo-'+i+'" value="'+esc(item.titulo)+'" placeholder="Ej: Hot Sale..." oninput="edForm.items['+i+'].titulo=this.value"></div>'+
    '<div><label class="ed-label">Categoría</label><select class="ed-input" id="it-cat-'+i+'" onchange="edForm.items['+i+'].cat=this.value">'+Object.entries(CAT).map(function(e){return '<option value="'+e[0]+'"'+(item.cat===e[0]?' selected':'')+'>'+e[1].label+'</option>';}).join('')+'</select></div></div>'+
    '<div style="margin-bottom:8px"><label class="ed-label">Texto</label><textarea class="ed-input" id="it-texto-'+i+'" rows="4" oninput="edForm.items['+i+'].texto=this.value">'+esc(item.texto)+'</textarea></div>'+
    '<div><label class="ed-label">Ícono</label><div class="ep-grid">'+eps+'</div></div></div>';
}

function setIcon(idx,emoji){
  edForm.items[idx].icon=emoji;
  document.getElementById('ied-'+idx).querySelectorAll('.ep').forEach(function(e){e.classList.remove('on');});
  event.target.classList.add('on');
}
function addItem(){
  edForm.items.push({id:Date.now(),icon:'🔸',cat:'acciones',titulo:'',texto:''});
  renderEditor(editingId);
}
function removeItem(i){edForm.items.splice(i,1);renderEditor(editingId);}
function cancelEdit(){editingId=null;edForm=null;renderArch();}

function saveNL(){
  var mes=document.getElementById('ef-mes').value;
  var titulo=document.getElementById('ef-titulo').value.trim();
  if(!mes||!titulo){toast('Completá al menos el mes y el título.');return;}
  edForm.mes=mes;
  edForm.year=parseInt(document.getElementById('ef-year').value)||new Date().getFullYear();
  edForm.titulo=titulo;
  edForm.subtitulo=document.getElementById('ef-sub').value.trim();
  edForm.intro=document.getElementById('ef-intro').value.trim();
  edForm.pinned=document.getElementById('ef-pin').checked;
  // collect any unsaved text/title from inputs
  edForm.items.forEach(function(item,i){
    var t=document.getElementById('it-titulo-'+i);var x=document.getElementById('it-texto-'+i);
    if(t)item.titulo=t.value;if(x)item.texto=x.value;
    var s=document.getElementById('it-cat-'+i);if(s)item.cat=s.value;
  });
  setSaving(true);
  var idx=DB.newsletters.findIndex(function(n){return n.id===edForm.id;});
  if(idx>=0) DB.newsletters[idx]=JSON.parse(JSON.stringify(edForm));
  else DB.newsletters.unshift(JSON.parse(JSON.stringify(edForm)));
  saveDB();
  setTimeout(function(){setSaving(false);toast('✓ Publicado. Todos los franquiciados ya ven los cambios.');editingId=null;edForm=null;renderArch();},600);
}

function deleteNL(id){
  if(!confirm('¿Confirmás que querés borrar este newsletter?'))return;
  DB.newsletters=DB.newsletters.filter(function(n){return n.id!==id;});
  saveDB();
  renderArch();
  toast('Newsletter eliminado.');
}

// ── BOOT ──────────────────────────────────────────────────
document.getElementById('lpw').focus();
</script>
</body>
</html>
